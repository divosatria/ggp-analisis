name: Deploy to VPS HERA2026

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ke Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pindah ke folder proyek di server
            cd ~/GGP/ggp-analisis
            
            # Pastikan server benar-benar tersinkronisasi murni dengan GitHub
            export GIT_TERMINAL_PROMPT=0
            git remote set-url origin https://github.com/divosatria/ggp-analisis.git
            git fetch origin main || echo "Git fetch failed but continuing"
            git reset --hard origin/main
            git clean -fd
            
            # Hentikan dan hapus container lama (seperti permintaan Anda)
            docker compose down
            
            # Build ulang tanpa cache agar perubahan UI pasti masuk
            docker compose build --no-cache
            
            # Jalankan ulang Docker container
            docker compose up -d
            
            # Bersihkan cache docker yang tidak terpakai agar server tidak penuh
            docker image prune -f
