name: Deploy to VPS HERA2026

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ke Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pindah ke folder proyek di server
            cd ~/GGP/ggp-analisis
            
            # Tarik kode terbaru dari GitHub
            git stash
            git pull origin main
            
            # Hentikan dan hapus container lama (seperti permintaan Anda)
            docker compose down
            
            # Build dan jalankan ulang Docker container
            docker compose up --build -d
            
            # Bersihkan cache docker yang tidak terpakai agar server tidak penuh
            docker image prune -f
